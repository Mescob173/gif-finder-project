<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gif Finder</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="site-header">
    <h1>Gif Finder</h1>

    <nav class="nav-menu">
      <a href="#">Home</a>
      <a href="#">Trending</a>
      <a href="#">About</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h2>Search for the perfect GIF</h2>
      <p>Type a word below and discover GIFs instantly.</p>

      <form id="search-form" class="search-form">
        <input id="search-input" type="search" placeholder="Search cats, funny, dance..." />
        <button type="submit">Search</button>
      </form>
    </section>

    <section id="results" class="gif-grid"></section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
